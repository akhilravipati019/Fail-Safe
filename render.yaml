services:
  # FastAPI backend
  - type: web
    name: failsafe-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: DATABASE_URL
        value: sqlite:///./failsafe.db
      # Update to the deployed frontend URL (comma-separate if you need more than one).
      - key: FRONTEND_ORIGIN
        value: https://failsafe-frontend.onrender.com
      # Set in the Render dashboard (kept out of the blueprint so it isn't committed).
      - key: GEMINI_API_KEY
        sync: false
      - key: LOGIN_MAX_ATTEMPTS
        value: "5"
      - key: LOGIN_LOCKOUT_MINUTES
        value: "15"

  # Static React frontend
  - type: static
    name: failsafe-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      # Update to the deployed backend URL (no trailing slash, no /api suffix).
      - key: VITE_API_BASE_URL
        value: https://failsafe-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
